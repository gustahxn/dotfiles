[main]
font=Noto Sans:weight=medium:size=14
prompt="  "
icon-theme=Papirus-Dark
icons-enabled=yes
show-actions=no
terminal=kitty -e
lines=10
width=35
horizontal-pad=25
vertical-pad=20
inner-pad=10
image-size-ratio=0.4
line-height=30
layer=top
exit-on-keyboard-focus-loss=yes

[colors]
background=0d0d0fdd
text=e0e0e0ff
input=e0e0e0ff
match=81a2beff
selection=25252baa
selection-text=ffffffff
selection-match=a3be8cff
border=1c1c21ff

[border]
width=1
radius=12

[dmenu]
mode=text
exit-immediately-if-empty=yes

[key-bindings]
cancel=Escape Mod+D 